// =================================================================
// RWA Treasury Bond Tokenization Platform
// Bank Participant Configuration
// =================================================================
//
// The bank is the ONLY Canton participant in this platform.
// This node connects to the Canton Global Synchronizer, which is
// operated by the Canton Network's super-validator consortium.
// The bank does NOT operate its own synchronizer.
//
// This node hosts ALL parties:
//   - escrowBank   (platform operator, custodian, broker)
//   - investor-*   (one party per investor, allocated on demand)
//
// Investors and other external entities (bond issuers, treasury
// providers, regulators) have NO Canton participant nodes.
// External integrations (DTC, Fedwire, SWIFT, KYC providers) are
// handled entirely by the bank's off-chain services.
//
// Ledger API is the entry point for:
//   - Investor Portal (submits as investor parties via JWT)
//   - All bank off-chain services (submits as escrowBank via mTLS + JWT)
//   - KYC, Custody, Minting, Coupon, Redemption, Reconciliation services
// =================================================================

canton {
  participants {
    bank {

      // ----- Storage -----
      storage {
        type = postgres
        config {
          dataSourceClass = "org.postgresql.ds.PGSimpleDataSource"
          properties {
            serverName   = "localhost"
            serverName   = ${?CANTON_BANK_DB_HOST}
            portNumber   = 5432
            portNumber   = ${?CANTON_BANK_DB_PORT}
            databaseName = "canton_bank_participant"
            databaseName = ${?CANTON_BANK_DB_NAME}
            user         = "canton"
            user         = ${?CANTON_BANK_DB_USER}
            password     = "canton"
            password     = ${?CANTON_BANK_DB_PASSWORD}
          }
        }
        max-connections = 32
      }

      // ----- Ledger API (gRPC, port 6865) -----
      // Application services connect here to submit/query the ledger.
      ledger-api {
        address = "0.0.0.0"
        port    = 6865
        port    = ${?CANTON_BANK_LEDGER_PORT}

        // Max message size — 20 MB to handle DAR uploads
        max-inbound-message-size = 20971520

        // ---- Production TLS (uncomment before going live) ----
        // tls {
        //   cert-chain-file        = ${CANTON_TLS_CERT_CHAIN}
        //   private-key-file       = ${CANTON_TLS_PRIVATE_KEY}
        //   trust-collection-file  = ${CANTON_TLS_TRUST_COLLECTION}
        //   client-auth            = require
        // }

        // ---- Production JWT auth (uncomment before going live) ----
        // Each service gets a scoped JWT (actAs one party only).
        // Investor Portal issues per-investor JWTs via Auth0 / Keycloak.
        // auth-services = [{
        //   type = jwt-rs-256-jwks
        //   url  = ${CANTON_AUTH_JWKS_URL}
        // }]
      }

      // ----- Admin API (local only, not exposed externally) -----
      // Used by: bootstrap scripts, party allocation, DAR upload
      admin-api {
        address = "127.0.0.1"
        port    = 6866
        port    = ${?CANTON_BANK_ADMIN_PORT}
      }

      // ----- Participant Identity -----
      init {
        parameters {
          unique-identifier {
            name = "escrow-bank"
          }
        }
      }

      // ----- Runtime Parameters -----
      parameters {
        // How long to retain pruned journal entries
        journal-garbage-collection-delay = 24h

        // ACS commitment reconciliation interval with Global Synchronizer
        reconciliation-interval = 30s

        // Submission batch size tuning (increase for higher throughput)
        // max-submission-size = 20971520
      }

      // ----- Topology -----
      topology {
        // Generate keys and identity automatically on first startup.
        // On production: keys should be stored in HSM (Thales Luna / AWS CloudHSM)
        auto-init = true
      }

      // ----- HSM (Production only — uncomment and configure) -----
      // crypto {
      //   provider = tink
      //   kms {
      //     type = aws-kms
      //     region = ${AWS_REGION}
      //     multi-region-key = false
      //   }
      // }
    }
  }

  // ----- Monitoring -----
  monitoring {
    grpc-health-server {
      address = "0.0.0.0"
      port    = 6867
    }
    metrics {
      reporters = [{
        type    = prometheus
        address = "0.0.0.0"
        port    = 6868
      }]
    }
  }
}
